# Cloudflare Worker config for the CollabSync signaling server.
#
# Deploy:  npm install && npx wrangler deploy
# Local:   npx wrangler dev   (serves at http://localhost:8787 )
#
# After deploy, Wrangler prints your Worker URL, e.g.
#   https://collabsync-signaling.<your-subdomain>.workers.dev
# The plugin connects to:  wss://collabsync-signaling.<your-subdomain>.workers.dev/rtc?room=CODE

name = "collabsync-signaling"
main = "src/index.js"
compatibility_date = "2026-01-15"

# The Room Durable Object relays signaling between the two peers.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

# IMPORTANT: new_sqlite_classes (not new_classes) makes the Durable Object use
# the SQLite storage backend, which is what allows it to run on the Workers
# FREE plan. We never actually write to storage, so this stays free.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
